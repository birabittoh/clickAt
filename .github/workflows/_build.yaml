name: Build

on:
  workflow_call:
    inputs:
      publish_mode:
        description: "'artifact' for CI workflow-artifact, 'release' for GitHub release"
        required: true
        type: string
      artifact_name:
        description: "Artifact name prefix"
        required: false
        type: string
        default: ""

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build and Package
        run: python3 build.py release

      - name: Prepare Artifacts
        shell: bash
        run: |
          PREFIX="${{ inputs.artifact_name || 'clickAt' }}"
          mv dist/chrome-release.zip "dist/${PREFIX}-chrome.zip"
          mv dist/firefox-release.zip "dist/${PREFIX}-firefox.zip"

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name || 'clickAt' }}-chrome.zip
          path: dist/${{ inputs.artifact_name || 'clickAt' }}-chrome.zip
          if-no-files-found: error

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name || 'clickAt' }}-firefox.zip
          path: dist/${{ inputs.artifact_name || 'clickAt' }}-firefox.zip
          if-no-files-found: error
